# SiteFoundry panel — serves the dashboard build and reverse-proxies the API.
# certbot rewrites this to add the 443 server + HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name __PANEL_DOMAIN__;

    # Dashboard static build
    root __APP_DIR__/apps/dashboard/dist;
    index index.html;

    # Template demo previews (built by `pnpm previews`)
    location /previews/ {
        alias __APP_DIR__/.local/previews/;
        try_files $uri $uri/ =404;
    }

    # API + public tracking/lead beacons
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Server-Sent Events (install progress) must not be buffered
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
